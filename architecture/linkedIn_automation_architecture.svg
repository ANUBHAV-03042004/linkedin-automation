<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Automation — Vertical Architecture</title>
<style>
  body { margin: 0; padding: 24px; background: #f8f7f4; font-family: system-ui, sans-serif; }
  svg text { font-family: system-ui, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .box { fill: #ededeb; stroke: #c0bfb8; }
  .node { cursor: default; }
  .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }
  .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
  .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }
  .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }
  .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }
  .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
  .c-pink .th { fill: #72243E; }
  .c-pink .ts { fill: #993556; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; }
    .th { fill: #e8e6de; }
    .ts { fill: #9c9a92; }
    .arr { stroke: #5f5e5a; }
    .box { fill: #2c2c2a; stroke: #444441; }
    .c-purple rect { fill: #26215C; stroke: #7F77DD; }
    .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
    .c-teal rect { fill: #04342C; stroke: #1D9E75; }
    .c-teal .th { fill: #9FE1CB; } .c-teal .ts { fill: #5DCAA5; }
    .c-gray rect { fill: #2C2C2A; stroke: #888780; }
    .c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #B4B2A9; }
    .c-amber rect { fill: #412402; stroke: #EF9F27; }
    .c-amber .th { fill: #FAC775; } .c-amber .ts { fill: #EF9F27; }
    .c-blue rect { fill: #042C53; stroke: #378ADD; }
    .c-blue .th { fill: #B5D4F4; } .c-blue .ts { fill: #85B7EB; }
    .c-coral rect { fill: #4A1B0C; stroke: #D85A30; }
    .c-coral .th { fill: #F5C4B3; } .c-coral .ts { fill: #F0997B; }
    .c-pink rect { fill: #4B1528; stroke: #D4537E; }
    .c-pink .th { fill: #F4C0D1; } .c-pink .ts { fill: #ED93B1; }
  }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- SHARED SPINE -->
<g class="node c-purple">
  <rect x="284" y="60" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="75" text-anchor="middle" dominant-baseline="central">Scheduler</text>
  <text class="ts" x="340" y="90" text-anchor="middle" dominant-baseline="central">Airforce API</text>
</g>
<line x1="340" y1="105" x2="340" y2="135" class="arr" marker-end="url(#arrow)"/>

<g class="node c-gray">
  <rect x="284" y="136" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="153" text-anchor="middle" dominant-baseline="central">Text parser</text>
  <text class="ts" x="340" y="169" text-anchor="middle" dominant-baseline="central">remove \n</text>
</g>
<line x1="340" y1="180" x2="340" y2="194" class="arr" marker-end="url(#arrow)"/>

<g class="node c-gray">
  <rect x="284" y="194" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="211" text-anchor="middle" dominant-baseline="central">Text parser</text>
  <text class="ts" x="340" y="227" text-anchor="middle" dominant-baseline="central">remove "</text>
</g>
<line x1="340" y1="238" x2="340" y2="252" class="arr" marker-end="url(#arrow)"/>

<g class="node c-gray">
  <rect x="284" y="252" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="269" text-anchor="middle" dominant-baseline="central">Text parser</text>
  <text class="ts" x="340" y="285" text-anchor="middle" dominant-baseline="central">remove '</text>
</g>
<line x1="340" y1="296" x2="340" y2="310" class="arr" marker-end="url(#arrow)"/>

<g class="node c-amber">
  <rect x="284" y="310" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="327" text-anchor="middle" dominant-baseline="central">Router</text>
  <text class="ts" x="340" y="343" text-anchor="middle" dominant-baseline="central">4 routes</text>
</g>

<!-- ROUTE 1: Mon+Tue  x=80 -->
<path d="M284 332 L114 332 L114 390" fill="none" stroke="#534AB7" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="114" y="382" text-anchor="middle">Mon+Tue</text>
<g class="node c-blue">
  <rect x="58" y="390" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="114" y="407" text-anchor="middle" dominant-baseline="central">LinkedIn</text>
  <text class="ts" x="114" y="423" text-anchor="middle" dominant-baseline="central">text post</text>
</g>

<!-- ROUTE 2: Wed+Thu  x=230 -->
<path d="M284 332 L230 332 L230 390" fill="none" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="230" y="382" text-anchor="middle">Wed+Thu</text>
<g class="node c-teal">
  <rect x="174" y="390" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="407" text-anchor="middle" dominant-baseline="central">HTTP POST</text>
  <text class="ts" x="230" y="423" text-anchor="middle" dominant-baseline="central">NVIDIA stability</text>
</g>
<line x1="230" y1="434" x2="230" y2="448" class="arr" marker-end="url(#arrow)"/>
<g class="node c-teal">
  <rect x="174" y="448" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="465" text-anchor="middle" dominant-baseline="central">HTTP POST</text>
  <text class="ts" x="230" y="481" text-anchor="middle" dominant-baseline="central">imgbb upload</text>
</g>
<line x1="230" y1="492" x2="230" y2="506" class="arr" marker-end="url(#arrow)"/>
<g class="node c-blue">
  <rect x="174" y="506" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="523" text-anchor="middle" dominant-baseline="central">LinkedIn</text>
  <text class="ts" x="230" y="539" text-anchor="middle" dominant-baseline="central">image post</text>
</g>

<!-- ROUTE 3: Fri+Sat  x=450 -->
<path d="M396 332 L450 332 L450 390" fill="none" stroke="#993C1D" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="450" y="382" text-anchor="middle">Fri+Sat</text>
<g class="node c-coral">
  <rect x="394" y="390" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="450" y="407" text-anchor="middle" dominant-baseline="central">HTTP POST</text>
  <text class="ts" x="450" y="423" text-anchor="middle" dominant-baseline="central">Mistral poll</text>
</g>
<line x1="450" y1="434" x2="450" y2="448" class="arr" marker-end="url(#arrow)"/>
<g class="node c-blue">
  <rect x="394" y="448" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="450" y="465" text-anchor="middle" dominant-baseline="central">LinkedIn</text>
  <text class="ts" x="450" y="481" text-anchor="middle" dominant-baseline="central">poll post</text>
</g>

<!-- ROUTE 4: Sunday  x=566 -->
<path d="M396 332 L566 332 L566 390" fill="none" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="566" y="382" text-anchor="middle">Sunday</text>
<g class="node c-pink">
  <rect x="510" y="390" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="407" text-anchor="middle" dominant-baseline="central">Tools</text>
  <text class="ts" x="566" y="423" text-anchor="middle" dominant-baseline="central">BGM selector</text>
</g>
<line x1="566" y1="434" x2="566" y2="448" class="arr" marker-end="url(#arrow)"/>
<g class="node c-teal">
  <rect x="510" y="448" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="465" text-anchor="middle" dominant-baseline="central">HTTP POST</text>
  <text class="ts" x="566" y="481" text-anchor="middle" dominant-baseline="central">Freepik+J2V</text>
</g>
<line x1="566" y1="492" x2="566" y2="506" class="arr" marker-end="url(#arrow)"/>
<g class="node c-gray">
  <rect x="510" y="506" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="523" text-anchor="middle" dominant-baseline="central">Tools sleep</text>
  <text class="ts" x="566" y="539" text-anchor="middle" dominant-baseline="central">30 seconds</text>
</g>
<line x1="566" y1="550" x2="566" y2="564" class="arr" marker-end="url(#arrow)"/>
<g class="node c-teal">
  <rect x="510" y="564" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="581" text-anchor="middle" dominant-baseline="central">HTTP GET</text>
  <text class="ts" x="566" y="597" text-anchor="middle" dominant-baseline="central">fetch video URL</text>
</g>
<line x1="566" y1="608" x2="566" y2="622" class="arr" marker-end="url(#arrow)"/>
<g class="node c-blue">
  <rect x="510" y="622" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="566" y="639" text-anchor="middle" dominant-baseline="central">LinkedIn</text>
  <text class="ts" x="566" y="655" text-anchor="middle" dominant-baseline="central">video post</text>
</g>

<!-- Legend -->
<rect x="20" y="720" width="640" height="80" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="340" y="742" text-anchor="middle" dominant-baseline="central">Legend</text>
<g class="c-purple"><rect x="40" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="58" y="769">Scheduler</text>
<g class="c-teal"><rect x="130" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="148" y="769">HTTP / AI</text>
<g class="c-gray"><rect x="220" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="238" y="769">Text parser</text>
<g class="c-amber"><rect x="320" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="338" y="769">Router</text>
<g class="c-blue"><rect x="400" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="418" y="769">LinkedIn</text>
<g class="c-pink"><rect x="480" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="498" y="769">Tools</text>
<g class="c-coral"><rect x="545" y="758" width="12" height="12" rx="2"/></g>
<text class="ts" x="563" y="769">Poll gen</text>
</svg>
</body>
</html>